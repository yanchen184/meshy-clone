  <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.5.0/model-viewer.min.js"></script>
  <style>
    :root {
      --bg: #0e0f13; --panel: #17191f; --line: #262a33;
      --fg: #e8eaed; --muted: #9aa0ac; --accent: #6d5efc; --accent2: #14e0c8;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0; font-family: system-ui, "Segoe UI", "Noto Sans TC", sans-serif;
      background: radial-gradient(1200px 600px at 70% -10%, #1c1f2b 0%, var(--bg) 55%);
      color: var(--fg); min-height: 100vh;
    }
    header { padding: 28px 24px 8px; text-align: center; }
    header h1 { margin: 0; font-size: 26px; letter-spacing: .3px; }
    header h1 .g {
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      -webkit-background-clip: text; background-clip: text; color: transparent;
    }
    header p { margin: 6px 0 0; color: var(--muted); font-size: 14px; }
    .wrap {
      max-width: 1040px; margin: 18px auto; padding: 0 18px;
      display: grid; grid-template-columns: 360px 1fr; gap: 18px;
    }
    @media (max-width: 820px) { .wrap { grid-template-columns: 1fr; } }
    .card {
      background: var(--panel); border: 1px solid var(--line);
      border-radius: 14px; padding: 18px;
    }
    .tabs { display: flex; gap: 6px; margin-bottom: 14px; }
    .tab {
      flex: 1; padding: 9px; text-align: center; font-size: 14px; font-weight: 600;
      border: 1px solid var(--line); border-radius: 9px; cursor: pointer;
      color: var(--muted); background: #14161d; transition: .15s;
    }
    .tab.active { color: #fff; border-color: var(--accent); background: #1b1e28; }
    .pane { display: none; }
    .pane.active { display: block; }
    textarea {
      width: 100%; min-height: 96px; resize: vertical; padding: 12px;
      border-radius: 10px; border: 1px solid var(--line); background: #14161d;
      color: var(--fg); font-size: 14px; font-family: inherit;
    }
    textarea:focus { outline: none; border-color: var(--accent); }
    .hint { margin-top: 8px; font-size: 12px; color: var(--muted); }
    .drop {
      border: 1.5px dashed var(--line); border-radius: 12px; padding: 26px 14px;
      text-align: center; cursor: pointer; transition: .15s; color: var(--muted);
    }
    .drop.drag, .drop:hover { border-color: var(--accent); color: var(--fg); background: #1b1e28; }
    .drop input { display: none; }
    .preview { margin-top: 14px; text-align: center; }
    .preview img { max-width: 100%; max-height: 220px; border-radius: 10px; border: 1px solid var(--line); }
    button {
      width: 100%; margin-top: 14px; padding: 12px; border: 0; border-radius: 10px;
      font-size: 15px; font-weight: 600; color: #fff; cursor: pointer;
      background: linear-gradient(90deg, var(--accent), #8b7dff);
    }
    button:disabled { opacity: .45; cursor: not-allowed; }
    .status { margin-top: 12px; font-size: 13px; color: var(--muted); min-height: 18px; }
    .viewer {
      display: flex; flex-direction: column; align-items: stretch;
      min-height: 460px;
    }
    model-viewer {
      width: 100%; flex: 1; min-height: 420px; background: #0b0c10;
      border-radius: 12px; border: 1px solid var(--line);
      --poster-color: transparent;
    }
    .empty {
      flex: 1; display: flex; align-items: center; justify-content: center;
      color: var(--muted); border: 1px solid var(--line); border-radius: 12px;
      min-height: 420px; text-align: center; padding: 20px;
    }
    .meta { margin-top: 12px; display: flex; gap: 10px; flex-wrap: wrap; font-size: 12px; color: var(--muted); }
    .meta .pill { background: #1b1e28; border: 1px solid var(--line); padding: 5px 10px; border-radius: 999px; }
    .dl { display: inline-block; margin-top: 12px; }
    a.dl { color: var(--accent2); text-decoration: none; font-size: 14px; font-weight: 600; }
    .spin { display: inline-block; width: 14px; height: 14px; border: 2px solid var(--line);
      border-top-color: var(--accent); border-radius: 50%; animation: s .8s linear infinite; vertical-align: -2px; }
    @keyframes s { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <header>
    <h1><span class="g">Bob 3D</span> — 圖生 3D</h1>
    <p>上傳一張圖，或打幾個字，用開源模型在本機 GPU 生出可旋轉的 3D 模型</p>
  </header>

  <div class="wrap">
    <div class="card">
      <div class="tabs">
        <div class="tab active" id="tabImg" data-pane="paneImg">📷 上傳圖片</div>
        <div class="tab" id="tabTxt" data-pane="paneTxt">⌨️ 打字生成</div>
      </div>

      <div class="pane active" id="paneImg">
        <label class="drop" id="drop">
          <input type="file" id="file" accept="image/*" />
          <div id="dropText">📷 點這裡或拖一張圖進來<br /><small>建議：單一主體、背景乾淨</small></div>
        </label>
        <div class="preview" id="preview"></div>
        <button id="gen" disabled>生成 3D 模型</button>
      </div>

      <div class="pane" id="paneTxt">
        <textarea id="prompt" placeholder="用英文描述一個單一物體，例如：a cute robot toy, a red teapot, a wooden chair"></textarea>
        <div class="hint">先用 SDXL-Turbo 生一張圖，再轉 3D。英文效果最好、描述單一主體。</div>
        <button id="genTxt">打字生成 3D</button>
      </div>

      <div class="status" id="status"></div>
    </div>

    <div class="card viewer">
      <div class="empty" id="empty">🧊 生成後的 3D 模型會出現在這裡<br /><small>可用滑鼠旋轉、滾輪縮放</small></div>
      <model-viewer id="mv" style="display:none" camera-controls auto-rotate
        shadow-intensity="1" exposure="1" ar></model-viewer>
      <div class="meta" id="meta"></div>
      <a class="dl" id="dl" style="display:none" download="model.glb">⬇ 下載 .glb</a>
    </div>
  </div>

  <script>
    const API = location.hostname === "localhost" || location.hostname === "127.0.0.1"
      ? "http://127.0.0.1:8000" : "";
    const $ = (id) => document.getElementById(id);
    let picked = null;

    const fileInput = $("file"), drop = $("drop");
    drop.addEventListener("dragover", (e) => { e.preventDefault(); drop.classList.add("drag"); });
    drop.addEventListener("dragleave", () => drop.classList.remove("drag"));
    drop.addEventListener("drop", (e) => {
      e.preventDefault(); drop.classList.remove("drag");
      if (e.dataTransfer.files[0]) setFile(e.dataTransfer.files[0]);
    });
    fileInput.addEventListener("change", () => fileInput.files[0] && setFile(fileInput.files[0]));

    function setFile(f) {
      picked = f;
      const url = URL.createObjectURL(f);
      $("preview").innerHTML = `<img src="${url}" alt="預覽" />`;
      $("dropText").innerHTML = `✅ ${f.name}<br /><small>換一張再點這裡</small>`;
      $("gen").disabled = false;
    }

    // ---- tab 切換 ----
    document.querySelectorAll(".tab").forEach((tab) => {
      tab.addEventListener("click", () => {
        document.querySelectorAll(".tab").forEach((t) => t.classList.remove("active"));
        document.querySelectorAll(".pane").forEach((p) => p.classList.remove("active"));
        tab.classList.add("active");
        $(tab.dataset.pane).classList.add("active");
      });
    });

    // ---- 共用：把後端回傳的結果顯示到 model-viewer ----
    function showResult(d) {
      const glb = API + d.model_url;
      const mv = $("mv");
      mv.src = glb;
      mv.style.display = "block";
      $("empty").style.display = "none";
      const t = d.timings_sec;
      const pills = [`<span class="pill">總耗時 ${d.total_sec}s</span>`];
      if (t.text2img != null) pills.push(`<span class="pill">生圖 ${t.text2img}s</span>`);
      pills.push(`<span class="pill">推論 ${t.inference}s</span>`);
      pills.push(`<span class="pill">建網格 ${t.mesh}s</span>`);
      pills.push(`<span class="pill">job ${d.job_id}</span>`);
      $("meta").innerHTML = pills.join("");
      const dl = $("dl");
      dl.href = glb; dl.style.display = "inline-block";
      $("status").innerHTML = `✅ 完成，共 ${d.total_sec}s`;
    }

    async function runGenerate(btn, url, body, statusText) {
      btn.disabled = true;
      $("status").innerHTML = `<span class="spin"></span> ${statusText}`;
      try {
        const r = await fetch(API + url, { method: "POST", body });
        if (!r.ok) throw new Error(await r.text());
        showResult(await r.json());
      } catch (e) {
        $("status").innerHTML = `❌ 失敗：${e.message}`;
      } finally {
        btn.disabled = false;
      }
    }

    $("gen").addEventListener("click", () => {
      if (!picked) return;
      const fd = new FormData();
      fd.append("image", picked);
      runGenerate($("gen"), "/api/generate", fd, "去背 → GPU 推論 → 建網格中…");
    });

    $("genTxt").addEventListener("click", () => {
      const prompt = $("prompt").value.trim();
      if (!prompt) { $("status").innerHTML = "❌ 請先輸入描述"; return; }
      const fd = new FormData();
      fd.append("prompt", prompt);
      runGenerate($("genTxt"), "/api/generate-from-text", fd,
        "SDXL 生圖 → 去背 → GPU 推論 → 建網格中…（第一次要載模型，久一點）");
    });
  </script>
</body>
</html>
